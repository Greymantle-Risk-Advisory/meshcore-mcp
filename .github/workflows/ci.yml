name: CI

on:
    push:
        branches: [main]
    pull_request:

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - run: npm ci
            - run: npm run type-check
            - run: npm run lint
            - run: npm run format:check
            - run: npm test

    deploy:
        needs: check
        # push only — pull_request (including from forks) never gets secret
        # access from GitHub Actions by default, but gating explicitly here
        # means a future workflow edit can't accidentally widen that.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - run: npm ci

            - uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  # CORESCOPE_BASE_URL/MESH_NAME aren't secrets (a public URL,
                  # a display name) but also aren't committed to
                  # wrangler.jsonc — repo variables + --var override the
                  # config's placeholder vars at deploy time. Single-quoted
                  # so MESH_NAME's space survives shell tokenization.
                  command: >-
                      deploy
                      --var 'CORESCOPE_BASE_URL:${{ vars.CORESCOPE_BASE_URL }}'
                      --var 'MESH_NAME:${{ vars.MESH_NAME }}'
