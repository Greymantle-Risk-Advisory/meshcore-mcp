name: CI

on:
    push:
        branches: [main]
    pull_request:

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - run: npm ci
            - run: npm run type-check
            - run: npm run lint
            - run: npm run format:check
            - run: npm test

    deploy:
        needs: check
        # push only — pull_request (including from forks) never gets secret
        # access from GitHub Actions by default, but gating explicitly here
        # means a future workflow edit can't accidentally widen that.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - run: npm ci

            # Runs wrangler directly (not cloudflare/wrangler-action) so the
            # CORESCOPE_BASE_URL/MESH_NAME overrides go through a real shell.
            # wrangler-action's `command:` input does naive whitespace-split
            # tokenization with no shell involved, so quoted values with
            # embedded spaces (MESH_NAME) get mangled — confirmed by testing
            # locally, a deploy that way produced garbage-named bindings.
            #
            # ${{ vars.* }} is bound via `env:` and referenced as $VAR rather
            # than interpolated directly into the run script: GitHub Actions
            # substitutes ${{ }} expressions as raw text before the shell
            # ever sees the line, so embedding one directly in a command is
            # injectable if the variable's value ever contains shell
            # metacharacters. Only repo admins can set these vars today, but
            # routing through env + $VAR costs nothing and removes the class
            # of bug entirely.
            - name: Deploy
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  CORESCOPE_BASE_URL: ${{ vars.CORESCOPE_BASE_URL }}
                  MESH_NAME: ${{ vars.MESH_NAME }}
              run: >-
                  npx wrangler deploy
                  --var "CORESCOPE_BASE_URL:$CORESCOPE_BASE_URL"
                  --var "MESH_NAME:$MESH_NAME"
